name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.4'
        extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql, bcmath, zip
        coverage: none

    - name: Install Dependencies
      run: |
        composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist
        npm install
        npm run build

    - name: Run Pint (Linting)
      run: ./vendor/bin/pint --test

    - name: Run PHPStan (Static Analysis)
      run: ./vendor/bin/phpstan analyse --memory-limit=1G

  testing:
    needs: build-and-lint
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.4'
        extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql, bcmath, zip
        coverage: none

    - name: Install Dependencies
      run: |
        composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist
        npm install
        npm run build

    - name: Copy .env
      run: php -r "file_exists('.env') || copy('.env.example', '.env');"

    - name: Generate key
      run: php artisan key:generate

    - name: Directory Permissions
      run: chmod -R 777 storage bootstrap/cache

    - name: Create Database
      run: |
        mkdir -p database
        touch database/database.sqlite

    - name: Run Migrations
      env:
        DB_CONNECTION: sqlite
        DB_DATABASE: database/database.sqlite
      run: php artisan migrate --force

    - name: Run Tests
      env:
        DB_CONNECTION: sqlite
        DB_DATABASE: database/database.sqlite
      run: php artisan test

  deploy:
    needs: testing
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.4'

    - name: Install Dependencies
      run: composer install --no-dev --optimize-autoloader --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

    - name: Install NPM Dependencies & Build
      run: |
        npm install
        npm run build

    - name: Prepare Deployment Package
      run: |
        # Update index.php to look for analyt inside the same folder
        sed -i "s|__DIR__.'/../|__DIR__.'/analyt/|g" public/index.php
        
        # Inject deployment token
        sed -i "s|DEPLOY_TOKEN_PLACEHOLDER|${{ secrets.DEPLOY_TOKEN }}|g" public/deploy-setup.php

        # Organize for upload
        mkdir -p dist/analyt
        
        # 1. Zip ONLY the vendor folder
        zip -r vendor.zip vendor/
        mv vendor.zip dist/analyt/

        # 2. Copy app files to analyt (excluding public, vendor, git, etc.)
        # Using find to get a list of files to copy instead of rsync for better control
        find . -maxdepth 1 ! -name "." ! -name "dist" ! -name "public" ! -name "vendor" ! -name ".git" ! -name ".github" ! -name "node_modules" ! -name "tests" ! -name "*.zip" -exec cp -r {} dist/analyt/ \;
        
        # 3. Copy public files to dist (these go directly into htdocs)
        cp -r public/. dist/
        
        # 4. Add security to prevent browser access to the core analyt folder
        echo "Deny from all" > dist/analyt/.htaccess
        
        # Verify package structure
        echo "Package root (dist/):"
        ls -F dist/
        echo "\nApp core (dist/analyt/):"
        ls -F dist/analyt/

    - name: FTP Upload
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        # Upload directly into htdocs
        server-dir: htdocs/
        local-dir: dist/
        git-server: false

    - name: Cleanup
      run: rm -rf dist

    - name: Cleanup
      run: rm -rf dist ftp_upload

    - name: Trigger Setup Script
      run: |
        # Call the setup script on the server to unzip and finalize
        # Ensure your APP_URL and DEPLOY_TOKEN secrets are set in GitHub Actions
        curl -X GET "${{ secrets.APP_URL }}/deploy-setup.php?token=${{ secrets.DEPLOY_TOKEN }}"
