name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.4'
        extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql, bcmath, zip
        coverage: none

    - name: Install Dependencies
      run: |
        composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist
        npm install
        npm run build

    - name: Run Pint (Linting)
      run: ./vendor/bin/pint --test

    - name: Run PHPStan (Static Analysis)
      run: ./vendor/bin/phpstan analyse --memory-limit=1G

  testing:
    needs: build-and-lint
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.4'
        extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql, bcmath, zip
        coverage: none

    - name: Install Dependencies
      run: |
        composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist
        npm install
        npm run build

    - name: Copy .env
      run: php -r "file_exists('.env') || copy('.env.example', '.env');"

    - name: Generate key
      run: php artisan key:generate

    - name: Directory Permissions
      run: chmod -R 777 storage bootstrap/cache

    - name: Create Database
      run: |
        mkdir -p database
        touch database/database.sqlite

    - name: Run Migrations
      env:
        DB_CONNECTION: sqlite
        DB_DATABASE: database/database.sqlite
      run: php artisan migrate --force

    - name: Run Tests
      env:
        DB_CONNECTION: sqlite
        DB_DATABASE: database/database.sqlite
      run: php artisan test

  deploy:
    needs: testing
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.4'

    - name: Install Dependencies
      run: composer install --no-dev --optimize-autoloader --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

    - name: Install NPM Dependencies & Build
      run: |
        npm install
        npm run build

    - name: Prepare Deployment Package
      run: |
        # Inject deployment token
        sed -i "s|DEPLOY_TOKEN_PLACEHOLDER|${{ secrets.DEPLOY_TOKEN }}|g" public/deploy-setup.php

        # Organize for upload
        mkdir -p dist
        
        # 1. Copy ALL relevant files to dist/
        find . -maxdepth 1 ! -name "." ! -name "dist" ! -name ".git" ! -name ".github" ! -name "node_modules" ! -name "tests" -exec cp -r {} dist/ \;
        
        # 2. Create the .htaccess inside the automation folder (dist root) to direct to the public folder
        sed 's/^        //' <<EOT > dist/.htaccess
        <IfModule mod_rewrite.c>
            RewriteEngine On
            RewriteBase /
            
            # Allow accessing the deployment script directly if it's in the root
            # (Though it's likely in public/ now)
            RewriteCond %{REQUEST_URI} !^/?deploy-setup.php
            
            # Don't rewrite if already pointing to public/
            RewriteCond %{REQUEST_URI} !^/?public/
            
            # Rewrite everything else to public/
            RewriteRule ^(.*)$ public/\$1 [L,QSA]
        </IfModule>
        EOT
        
        # 3. Add security to prevent direct access to core folders except public
        sed 's/^        //' <<EOT >> dist/.htaccess
        
        # Prevent direct access to core files but allow the public directory
        RewriteCond %{REQUEST_URI} !^/?public/
        RewriteCond %{REQUEST_URI} ^/?(app|bootstrap|config|database|resources|routes|storage|vendor)
        RewriteRule ^.*$ - [F,L]
        EOT
        
        # Verify package structure
        echo "Package root (dist/):"
        ls -F dist/
        echo "\nPublic core (dist/public/):"
        ls -F dist/public/

    - name: FTP Upload
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        # Upload directly into automation folder
        server-dir: automation/
        local-dir: dist/
        git-server: false

    - name: Cleanup
      run: rm -rf dist ftp_upload

    - name: Trigger Setup Script
      run: |
        # Call the setup script on the server to finalize
        # Ensure your APP_URL and DEPLOY_TOKEN secrets are set in GitHub Actions
        # We use -L to follow redirects if any, and -i to see headers
        curl -i -L -X GET "${{ secrets.APP_URL }}/deploy-setup.php?token=${{ secrets.DEPLOY_TOKEN }}"
