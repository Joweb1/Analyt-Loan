name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write
  security-events: write # Required for CodeQL or security uploads

jobs:
  build-and-lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.4'
        extensions: mbstring, xml, ctype, iconv, intl, pdo_pgsql, pdo_mysql, redis, bcmath, zip
        coverage: none

    - name: Install Dependencies
      run: |
        composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist
        npm install
        npm run build

    - name: "Security: Dependency Audit (SCA)"
      run: |
        composer audit
        npm audit --audit-level=high

    - name: Run Pint (Linting)
      run: ./vendor/bin/pint --test

    - name: Run PHPStan (Static Analysis)
      run: ./vendor/bin/phpstan analyse --memory-limit=1G

  testing:
    needs: build-and-lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.4', '8.5'] # Matrix testing for PHP versions
    env:
      APP_ENV: testing
    steps:
    - uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ matrix.php }}
        extensions: mbstring, xml, ctype, iconv, intl, pdo_pgsql, pdo_mysql, redis, bcmath, zip
        coverage: none

    - name: Install Dependencies
      run: |
        composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist
        npm install
        npm run build

    - name: Copy .env
      run: php -r "file_exists('.env') || copy('.env.testing', '.env');"

    - name: Generate key
      run: php artisan key:generate

    - name: Directory Permissions
      run: chmod -R 777 storage bootstrap/cache

    - name: Run Tests
      run: php artisan test

  performance-benchmark:
    needs: testing
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.4'

    - name: Install Dependencies & Build
      run: |
        composer install --no-dev --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist
        npm install
        npm run build

    - name: Start Laravel Server
      run: php artisan serve --port=8000 &
      env:
        APP_ENV: testing

    - name: Wait for Server to be Ready
      run: |
        timeout 60s bash -c 'until curl -s http://localhost:8000 > /dev/null; do
          echo "Waiting for Laravel server to start..."
          sleep 2
        done'

    - name: Setup k6
      uses: grafana/setup-k6-action@v1

    - name: Run k6 Performance Test
      run: k6 run tests/performance/load-test.js

  prepare-artifact-and-push:
    needs: performance-benchmark
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.4'

    - name: Prune Dev Dependencies
      run: composer install --no-dev --optimize-autoloader --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

    - name: Install NPM Dependencies & Build Assets
      run: |
        npm install
        npm run build

    - name: Create Release Zip
      run: |
        zip -r release.zip . -x ".git/*" ".github/*" "node_modules/*" "vendor/*" "tests/*" "phpstan.neon" "phpunit.xml" ".dockerignore" "docker-compose.yml" "Dockerfile" "*.zip" "*.rdb"

    - name: Push to deploy branch
      run: |
        mkdir deploy-dir
        cp release.zip deploy-dir/
        cp Dockerfile deploy-dir/
        cp deployment/start.sh deploy-dir/start.sh
        cd deploy-dir
        git init
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git checkout -b deploy
        git add .
        git commit -m "Build artifact for deployment (Verified: Matrix, Security, Performance)"
        git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
        git push origin deploy --force

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-assets
        path: |
          release.zip
          Dockerfile
          deployment/start.sh

  create-release:
    needs: prepare-artifact-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4

    - name: Download Artifacts
      uses: actions/download-artifact@v4
      with:
        name: build-assets

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ github.run_number }}
        name: Release v${{ github.run_number }}
        draft: false
        prerelease: false
        files: |
          release.zip
          Dockerfile
          start.sh
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
