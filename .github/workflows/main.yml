name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.4'
        extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql, bcmath, zip
        coverage: none

    - name: Install Dependencies
      run: |
        composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist
        npm install
        npm run build

    - name: Run Pint (Linting)
      run: ./vendor/bin/pint --test

    - name: Run PHPStan (Static Analysis)
      run: ./vendor/bin/phpstan analyse --memory-limit=1G

  testing:
    needs: build-and-lint
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.4'
        extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql, bcmath, zip
        coverage: none

    - name: Install Dependencies
      run: |
        composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist
        npm install
        npm run build

    - name: Copy .env
      run: php -r "file_exists('.env') || copy('.env.example', '.env');"

    - name: Generate key
      run: php artisan key:generate

    - name: Directory Permissions
      run: chmod -R 777 storage bootstrap/cache

    - name: Create Database
      run: |
        mkdir -p database
        touch database/database.sqlite

    - name: Run Migrations
      env:
        DB_CONNECTION: sqlite
        DB_DATABASE: database/database.sqlite
      run: php artisan migrate --force

    - name: Run Tests
      env:
        DB_CONNECTION: sqlite
        DB_DATABASE: database/database.sqlite
      run: php artisan test

  deploy:
    needs: testing
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.4'

    - name: Install Dependencies
      run: composer install --no-dev --optimize-autoloader --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

    - name: Install NPM Dependencies & Build
      run: |
        npm install
        npm run build

    - name: Prepare Deployment Package
      run: |
        # Update index.php for cPanel structure
        # When moved to 'htdocs', it needs to point back to the 'analyt' folder
        sed -i "s|__DIR__.'/../|__DIR__.'/../analyt/|g" public/index.php
        
        # Create the zip file of the entire project
        zip -r deploy.zip . -x ".git/*" ".github/*" "node_modules/*" "tests/*" "storage/*.key"

        # Organize files for FTP upload
        mkdir -p ftp_upload/htdocs
        mv deploy.zip ftp_upload/
        cp public/deploy-setup.php ftp_upload/htdocs/

    - name: FTP Upload
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        server-dir: /
        local-dir: ftp_upload/

    - name: Trigger Setup Script
      run: |
        # Call the setup script on the server to unzip and finalize
        # Ensure your APP_URL secret is set in GitHub Actions
        # Using a fixed token for simplicity, but you can use a secret if preferred.
        curl -X GET "${{ secrets.APP_URL }}/deploy-setup.php?token=analyt_deploy_secret_2026"
