version: '3.8'
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    environment:
      - "DB_HOST=host.docker.internal"
      - "DB_PORT=3306"
      - "DB_DATABASE=laravel"
      - "DB_USERNAME=root"
      - "DB_PASSWORD="
      - "REDIS_HOST=redis"
      - "REDIS_CLIENT=phpredis"
    depends_on:
      - redis

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
